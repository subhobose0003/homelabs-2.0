apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: external-dns
  labels:
    app.kubernetes.io/name: external-dns
    app.kubernetes.io/component: infrastructure
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: external-dns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
      - name: external-dns
        image: registry.k8s.io/external-dns/external-dns:v0.14.0
        args:
        - --source=service
        - --source=ingress
        - --domain-filter=nonprod.internal  # Replace with your internal domain
        - --provider=rfc2136
        - --rfc2136-host=10.0.0.1  # Replace with your DNS server IP
        - --rfc2136-port=53
        - --rfc2136-zone=nonprod.internal
        - --rfc2136-tsig-secret-alg=hmac-sha256
        - --rfc2136-tsig-keyname=externaldns-key
        - --rfc2136-tsig-secret=$(DNS_SERVER_SECRET)
        - --txt-owner-id=external-dns-nonprod
        - --txt-prefix=external-dns-
        - --policy=sync
        - --registry=txt
        - --interval=1m
        - --log-format=text
        - --log-level=info
        env:
        - name: DNS_SERVER_SECRET
          valueFrom:
            secretKeyRef:
              name: external-dns-secret
              key: dns-server-secret
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
