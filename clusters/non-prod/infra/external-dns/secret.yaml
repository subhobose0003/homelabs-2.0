# External DNS Secret for Internal DNS Server
# This will be managed by HashiCorp Vault once deployed
apiVersion: v1
kind: Secret
metadata:
  name: external-dns-secret
  namespace: external-dns
type: Opaque
data:
  # Base64 encoded DNS server credentials
  # Replace with actual values or use Vault integration
  dns-server-key: "REPLACE_WITH_BASE64_ENCODED_KEY"
  dns-server-secret: "REPLACE_WITH_BASE64_ENCODED_SECRET"
---
