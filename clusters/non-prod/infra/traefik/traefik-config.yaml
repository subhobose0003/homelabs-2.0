apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-config
  namespace: traefik-system
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/component: infrastructure
data:
  traefik.yml: |
    # Traefik Configuration
    global:
      checkNewVersion: false
      sendAnonymousUsage: false

    # Entry Points
    entryPoints:
      web:
        address: ":80"
        http:
          redirections:
            entrypoint:
              to: websecure
              scheme: https
      websecure:
        address: ":443"

    # Providers
    providers:
      kubernetesIngress:
        ingressClass: traefik
      kubernetesCRD: {}

    # Certificate Resolvers
    certificatesResolvers:
      letsencrypt:
        acme:
          email: admin@nonprod.internal  # Replace with your email
          storage: /data/acme.json
          dnsChallenge:
            provider: cloudflare
            resolvers:
              - "1.1.1.1:53"
              - "8.8.8.8:53"
            delayBeforeCheck: 30s

    # API and Dashboard
    api:
      dashboard: true
      insecure: false

    # Metrics
    metrics:
      prometheus:
        addEntryPointsLabels: true
        addServicesLabels: true

    # Access Logs
    accessLog:
      format: json

    # Tracing (optional)
    # tracing:
    #   jaeger:
    #     samplingServerURL: http://jaeger:5778/sampling
