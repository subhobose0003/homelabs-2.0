apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-storage
  namespace: minio
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: infrastructure
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-v2
  resources:
    requests:
      storage: 100Gi  # Adjust based on your third disk size
---
