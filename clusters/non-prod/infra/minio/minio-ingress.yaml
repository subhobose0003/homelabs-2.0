apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-console-ingress
  namespace: minio
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    traefik.ingress.kubernetes.io/router.middlewares: minio-auth@kubernetescrd
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: infrastructure
spec:
  tls:
  - hosts:
    - minio.nonprod.internal
    secretName: minio-console-tls
  rules:
  - host: minio.nonprod.internal
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: minio-console
            port:
              number: 9001
---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: auth
  namespace: minio
spec:
  basicAuth:
    secret: minio-auth-secret
---
# Basic auth secret (temporary - will be managed by Vault later)
apiVersion: v1
kind: Secret
metadata:
  name: minio-auth-secret
  namespace: minio
type: Opaque
data:
  # admin:admin (change this!)
  users: YWRtaW46JGFwcjEkSDY1dnVhNDYkLjFkVzNJSC5QWGVzV2xQcUcuRzgwLgo=
