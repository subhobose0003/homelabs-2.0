apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vault-storage
  namespace: vault
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: infrastructure
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-v2
  resources:
    requests:
      storage: 10Gi
