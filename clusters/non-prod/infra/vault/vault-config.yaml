apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: vault
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: infrastructure
data:
  vault.hcl: |
    # Vault Configuration
    ui = true
    
    # Storage Backend
    storage "file" {
      path = "/vault/data"
    }
    
    # Listener
    listener "tcp" {
      address = "0.0.0.0:8200"
      tls_disable = true  # TLS handled by Traefik
    }
    
    # API Address
    api_addr = "http://vault.nonprod.internal:8200"
    cluster_addr = "http://vault:8201"
    
    # Disable mlock for containers
    disable_mlock = true
    
    # Log level
    log_level = "INFO"
