apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-ingress
  namespace: vault
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    traefik.ingress.kubernetes.io/router.middlewares: vault-auth@kubernetescrd
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: infrastructure
spec:
  tls:
  - hosts:
    - vault.nonprod.internal
    secretName: vault-tls
  rules:
  - host: vault.nonprod.internal
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vault
            port:
              number: 8200
---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: auth
  namespace: vault
spec:
  basicAuth:
    secret: vault-auth-secret
---
# Basic auth secret (temporary - will be managed by Vault itself later)
apiVersion: v1
kind: Secret
metadata:
  name: vault-auth-secret
  namespace: vault
type: Opaque
data:
  # admin:admin (change this!)
  users: YWRtaW46JGFwcjEkSDY1dnVhNDYkLjFkVzNJSC5QWGVzV2xQcUcuRzgwLgo=
