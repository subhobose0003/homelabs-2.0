apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longhorn-ingress
  namespace: longhorn-system
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
    # Basic auth - will be replaced with proper auth later
    traefik.ingress.kubernetes.io/router.middlewares: longhorn-system-auth@kubernetescrd
  labels:
    app.kubernetes.io/name: longhorn
    app.kubernetes.io/component: infrastructure
spec:
  tls:
  - hosts:
    - longhorn.nonprod.internal
    secretName: longhorn-tls
  rules:
  - host: longhorn.nonprod.internal
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: longhorn-frontend
            port:
              number: 80
---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: auth
  namespace: longhorn-system
spec:
  basicAuth:
    secret: longhorn-auth-secret
---
# Basic auth secret (temporary - will be managed by Vault later)
apiVersion: v1
kind: Secret
metadata:
  name: longhorn-auth-secret
  namespace: longhorn-system
type: Opaque
data:
